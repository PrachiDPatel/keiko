<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Session — Keiko</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo"><span>🥷</span> Keiko</div>
  <a class="nav-link active" href="log.html"><span class="nav-icon">✏️</span> Log Session</a>
  <a class="nav-link" href="index.html"><span class="nav-icon">📊</span> Dashboard</a>
  <a class="nav-link" href="analysis.html"><span class="nav-icon">💰</span> Cost Analysis</a>
  <div class="credits">inspo creds: Liam Thompson</div>
</nav>

<main class="main log-main">
  <div class="page-title">Log a Session</div>
  <div class="page-sub" id="log-sub">Loading…</div>

  <div class="log-wrap">

    <!-- Form -->
    <div class="card">
      <div id="already-logged" style="display:none;padding:.75rem 1rem;border-radius:8px;background:#F1F5F9;font-size:.9rem;margin-bottom:1rem"></div>
      <form id="log-form">
        <div class="form-grid" style="margin-bottom:1.25rem">

          <div class="form-group" style="grid-column:1/-1">
            <label>Reporter</label>
            <input type="text" id="f-reporter" placeholder="Your name" required autofocus autocomplete="name">
          </div>

          <div class="form-group">
            <label>Kids present</label>
            <input type="number" id="f-kids" min="0" max="100" placeholder="0" required>
          </div>
          <div class="form-group">
            <label>Coding Senseis working</label>
            <input type="number" id="f-senseis" min="2" max="20" placeholder="2" required>
          </div>

        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Save Session</button>
      </form>
    </div>

    <!-- Auto-detected context (collapsed) -->
    <details id="ctx-details">
      <summary class="more-stats-summary" style="margin:.25rem 0">
        <span class="more-stats-btn">Session context</span>
        <div class="rule"></div>
      </summary>
      <div class="card">
        <div class="card-title">Auto-detected context</div>
        <div style="display:flex;flex-direction:column;gap:.75rem;font-size:.875rem">
          <div><span style="color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Session time</span><br>
            <span id="ctx-time">—</span></div>
          <div><span style="color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">School status</span><br>
            <span id="ctx-school">—</span></div>
          <div><span style="color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Weather</span><br>
            <span id="ctx-weather">Loading…</span></div>
          <div><span style="color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Precipitation forecast</span><br>
            <span id="ctx-precip">—</span></div>
          <div><span style="color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Traffic near CodeNinjas</span><br>
            <span id="ctx-traffic">Loading…</span></div>
        </div>
      </div>
    </details>

  </div>
</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/secrets.js" onerror="void 0"></script>
<script src="js/db.js"></script>
<script src="js/weather.js"></script>
<script src="js/traffic.js"></script>
<script src="js/calendar.js"></script>
<script>
const today = new Date().toISOString().slice(0, 10);

function sessionTimeForDate(dateStr) {
  const day = new Date(dateStr + 'T12:00:00').getDay();
  return CONFIG.schedule[day] || null;
}

// ── Page subtitle ─────────────────────────────────────────────────────────────
document.getElementById('log-sub').textContent =
  new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

// ── Context + previous entries ────────────────────────────────────────────────
let _weather = {}, _cal = {}, _traffic = null, _existingSession = null;

async function init() {
  // Session time for today
  const sessionTime = sessionTimeForDate(today);
  const timeEl = document.getElementById('ctx-time');
  if (sessionTime) {
    timeEl.textContent = sessionTime;
  } else {
    timeEl.innerHTML = '<span style="color:var(--amber)">No session scheduled today</span>';
  }

  const cal = SCHOOL_CALENDAR.getInfo(today);
  const typeMap = { school: 'school-day', holiday: 'no-school', break: 'no-school', summer: 'summer', weekend: 'weekend' };
  document.getElementById('ctx-school').innerHTML =
    `<span class="school-badge ${typeMap[cal.type] || 'weekend'}">${cal.desc}</span>`;

  const w = await fetchWeather(CONFIG.latitude, CONFIG.longitude, today);
  document.getElementById('ctx-weather').textContent =
    w.temp_f ? `${weatherIcon(w.code)} ${Math.round(w.temp_f)}°F — ${w.desc}` : `${weatherIcon(w.code)} ${w.desc}`;
  document.getElementById('ctx-precip').textContent =
    w.precip_mm != null ? `${w.precip_mm} mm` : '—';

  _weather = w;
  _cal = cal;

  // Traffic — prefer session-time snapshot (captured by GitHub Actions), fall back to real-time
  const trafficEl = document.getElementById('ctx-traffic');
  const snap = await getTrafficSnapshot(today);
  if (snap) {
    _traffic = { congestion: snap.congestion, currentSpeed: snap.current_speed, capturedAt: snap.captured_at };
    trafficEl.textContent = `${trafficIcon(snap.congestion)} (${snap.current_speed} mph · session-time reading)`;
  } else {
    const t = await fetchTraffic(CONFIG.latitude, CONFIG.longitude, CONFIG.tomtomKey);
    _traffic = t;
    if (t) {
      const minsOff = sessionTime ? Math.round(minutesFromSession(sessionTime)) : null;
      const timeNote = minsOff !== null && Math.abs(minsOff) > 30
        ? ` · ${Math.abs(minsOff)}m ${minsOff > 0 ? 'after' : 'before'} session`
        : '';
      trafficEl.textContent = `${trafficIcon(t.congestion)} (${t.currentSpeed} mph${timeNote})`;
    } else {
      trafficEl.textContent = sessionTime ? `Snapshot pending at ${sessionTime}` : '—';
    }
  }

  // Check if today already has an entry
  const existing = await getSessionByDate(today);
  if (existing.length) {
    _existingSession = existing[0];
    showAlreadyLoggedBanner(_existingSession);
  }
}

function showAlreadyLoggedBanner(e) {
  const banner = document.getElementById('already-logged');
  banner.style.display = 'block';
  banner.style.background = '#F1F5F9';
  banner.innerHTML = `✅ Already logged by <b>${e.reporter}</b> — ${e.kids_count} kids, ${e.senseis_count} senseis. <button type="button" id="incorrect-btn" style="margin-left:.75rem;font-size:.82rem;background:none;border:none;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0">This is incorrect</button>`;
  document.getElementById('log-form').querySelectorAll('input,button').forEach(el => el.disabled = true);
  document.getElementById('incorrect-btn').addEventListener('click', enterCorrectionMode);
}

function enterCorrectionMode() {
  const e = _existingSession;
  document.getElementById('f-reporter').value = e.reporter;
  document.getElementById('f-kids').value = e.kids_count;
  document.getElementById('f-senseis').value = e.senseis_count;
  document.getElementById('log-form').querySelectorAll('input,button').forEach(el => el.disabled = false);
  const banner = document.getElementById('already-logged');
  banner.style.background = '#FEF3C7';
  banner.innerHTML = `⚠️ Correcting entry by <b>${e.reporter}</b>. Update the values and save.`;
  document.getElementById('submit-btn').textContent = 'Save Correction';
}

// ── Form submit ───────────────────────────────────────────────────────────────
document.getElementById('log-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  // Compute week of school year
  function weekOfSchoolYear(dateStr) {
    const cal = SCHOOL_CALENDAR.getInfo(dateStr);
    if (!['school','early_release'].includes(cal.type)) return null;
    const yr = new Date(dateStr + 'T12:00:00').getFullYear();
    // Find nearest school year start (Aug of same or prior year)
    const candidates = [yr-1, yr, yr+1].map(y => {
      const d = new Date(`${y}-08-01T12:00:00`);
      // Walk forward to first school day
      for (let i = 0; i < 60; i++) {
        const s = new Date(d.getTime() + i*86400000).toISOString().slice(0,10);
        if (['school','early_release'].includes(SCHOOL_CALENDAR.getInfo(s).type)) return new Date(s+'T12:00:00');
      }
      return null;
    }).filter(Boolean);
    const target = new Date(dateStr + 'T12:00:00');
    const start = candidates.filter(c => c <= target).sort((a,b)=>b-a)[0];
    if (!start) return null;
    return Math.ceil((target - start) / (7 * 86400000)) + 1;
  }

  const [prevKids, prev3Avg] = await Promise.all([
    getPrevSession(today),
    getPrev3AvgKids(today),
  ]);
  const dow = new Date(today + 'T12:00:00').getDay();
  const wk  = weekOfSchoolYear(today);

  const data = {
    date:           today,
    reporter:       document.getElementById('f-reporter').value.trim(),
    time_slot:      sessionTimeForDate(today) || 'unscheduled',
    kids_count:     +document.getElementById('f-kids').value,
    senseis_count:  +document.getElementById('f-senseis').value,
    duration_hours: CONFIG.defaultSessionHours,
    weather_temp_f: _weather.temp_f    ?? null,
    weather_code:   _weather.code      ?? null,
    weather_precip: _weather.precip_mm ?? null,
    weather_desc:   _weather.desc      ?? null,
    is_school_day:        ['school', 'early_release'].includes(_cal.type),
    school_event:         _cal.desc ?? null,
    traffic_congestion:   _traffic?.congestion  ?? null,
    traffic_captured_at:  _traffic?.capturedAt  ?? null,
    week_of_school_year:  wk,
    prev_session_kids:    prevKids,
    prev_3session_avg:    prev3Avg,
    day_of_week:          dow,
  };

  try {
    if (_existingSession) {
      await updateSession(_existingSession.id, data);
      toast('Correction saved ✓');
    } else {
      await logSession(data);
      toast('Session saved ✓');
    }
    const banner = document.getElementById('already-logged');
    banner.style.display = 'block';
    banner.style.background = '#F1F5F9';
    banner.innerHTML = `✅ Logged by <b>${data.reporter}</b> — ${data.kids_count} kids, ${data.senseis_count} senseis.`;
    document.getElementById('log-form').querySelectorAll('input,button').forEach(el => el.disabled = true);
  } catch(err) {
    toast('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Session';
  }
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show';
  setTimeout(() => t.className = '', 3000);
}

init().catch(console.error);
</script>
<script src="js/override.js" onerror="void 0"></script>
</body>
</html>
